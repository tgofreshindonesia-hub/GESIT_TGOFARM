<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GESIT - TgoFarm Indonesia</title>
<style>
  :root{
    --green-deep:#0B3D2E; --green:#3E8E4F; --green-light:#EAF4EC;
    --lime:#7CB342; --amber:#C98A2C; --red:#B33A3A; --ink:#1B2A22; --paper:#F7FAF7; --line:#DCE6DD;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Segoe UI',Arial,sans-serif; background:var(--paper); color:var(--ink);}
  .hidden{display:none !important;}

  /* LOGIN */
  #loginScreen{min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,var(--green-deep),var(--green) 60%,var(--lime));}
  .login-card{background:#fff; padding:34px 32px; border-radius:16px; box-shadow:0 20px 50px rgba(0,0,0,.28); width:320px; text-align:center;}
  .login-card img.logo{width:88px; height:88px; margin-bottom:10px;}
  .login-card h1{font-size:20px; color:var(--green-deep); letter-spacing:1px; margin-bottom:2px;}
  .login-card .app-tagline{font-size:11px; color:var(--green); font-weight:600; margin-bottom:2px;}
  .login-card p{font-size:11px; color:#888; margin-bottom:20px;}
  .pin-input{width:100%; padding:14px; font-size:22px; text-align:center; letter-spacing:8px; border:2px solid var(--line); border-radius:8px; margin-bottom:14px;}
  .btn{background:var(--green-deep); color:#fff; border:none; padding:12px 20px; border-radius:8px; font-size:14px; cursor:pointer; width:100%; font-weight:600;}
  .btn:hover{background:var(--green);}
  .err-msg{color:var(--red); font-size:12px; margin-top:10px; min-height:16px;}
  .reset-pin-link{font-size:11px; color:#999; margin-top:14px; cursor:pointer; text-decoration:underline; text-underline-offset:2px;}
  .reset-pin-link:hover{color:var(--green-deep);}

  /* APP SHELL */
  #app{display:none; min-height:100vh;}
  #app.show{display:flex;}
  .sidebar{width:225px; background:var(--green-deep); color:#fff; padding:20px 0; flex-shrink:0;}
  .sidebar .brand{background:#fff; margin:14px; padding:14px 12px; border-radius:12px; border-bottom:none; display:flex; align-items:center; gap:10px;}
  .sidebar .brand img{width:42px; height:42px;}
  .sidebar .brand .name{font-size:15px; font-weight:700; line-height:1.1; color:var(--green-deep);}
  .sidebar .brand .tag{font-size:9px; color:#7a8f80;}
  .sidebar .role-badge{font-size:10px; background:rgba(255,255,255,.15); padding:3px 10px; border-radius:10px; display:inline-block; margin:10px 20px 6px;}
  .nav-item{padding:12px 20px; cursor:pointer; font-size:13px; opacity:.85; border-left:3px solid transparent;}
  .nav-item:hover{background:rgba(255,255,255,.08);}
  .nav-item.active{opacity:1; border-left-color:var(--lime); background:rgba(255,255,255,.1); font-weight:600;}
  .logout{margin-top:20px; padding:10px 20px; font-size:12px; opacity:.7; cursor:pointer;}
  .main{flex:1; padding:26px 30px; overflow-y:auto;}
  .main h1{font-size:20px; color:var(--green-deep); margin-bottom:4px;}
  .main .sub{font-size:12px; color:#888; margin-bottom:20px;}

  .cards{display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:24px;}
  .card{background:#fff; border:1px solid var(--line); border-radius:10px; padding:16px;}
  .card .label{font-size:11px; color:#888; margin-bottom:6px;}
  .card .value{font-size:22px; font-weight:700; color:var(--green-deep);}
  .card.warn .value{color:var(--red);}

  table{width:100%; border-collapse:collapse; background:#fff; border-radius:8px; overflow:hidden; font-size:13px;}
  th{background:var(--green-light); color:var(--green-deep); text-align:left; padding:10px 8px; font-size:11px; text-transform:uppercase;}
  td{padding:9px 8px; border-bottom:1px solid var(--line);}
  tr:hover td{background:#fafcf9;}
  .tag{padding:2px 8px; border-radius:10px; font-size:10px; font-weight:700;}
  .tag.AMAN{background:#DFF3DF; color:#2E7D32;}
  .tag.REORDER{background:#FDECC8; color:var(--amber);}
  .tag.HABIS{background:#FADBD8; color:var(--red);}
  .tag.Locked{background:#DFF3DF; color:#2E7D32;}
  .tag.BelumLock, .tag[data-status="Belum Lock"]{background:#FDECC8; color:var(--amber);}

  .panel{background:#fff; border:1px solid var(--line); border-radius:10px; padding:20px; margin-bottom:20px;}
  .panel h3{font-size:14px; color:var(--green-deep); margin-bottom:14px;}
  .form-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .form-grid.full{grid-template-columns:1fr;}
  label{font-size:11px; color:#666; display:block; margin-bottom:4px;}
  input,select,textarea{width:100%; padding:9px; border:1px solid var(--line); border-radius:6px; font-size:13px;}
  .form-actions{margin-top:16px; display:flex; gap:10px;}
  .btn-sm{width:auto; padding:9px 18px; font-size:13px;}
  .btn-secondary{background:#fff; color:var(--green-deep); border:1px solid var(--green-deep);}
  .btn-mini{width:auto; padding:5px 12px; font-size:11px; border-radius:14px; cursor:pointer; border:1px solid var(--line); background:#fff;}
  .btn-mini.lock{color:#2E7D32; border-color:#2E7D32;}
  .btn-mini.unlock{color:var(--amber); border-color:var(--amber);}
  .toast{position:fixed; bottom:20px; right:20px; background:var(--green-deep); color:#fff; padding:12px 18px; border-radius:8px; font-size:13px; box-shadow:0 6px 20px rgba(0,0,0,.2); display:none;}
  .toast.show{display:block;}
  .toast.error{background:var(--red);}
  .loading{font-size:12px; color:#999; padding:10px;}
</style>
</head>

<script>
/* ================= CONFIG ================= */
var GAS_URL = 'https://script.google.com/macros/s/AKfycbyEdTUMfZjqbCmo89i549mvXABlryBixF1x3ohVv-TL-P9LCXdGQswwvrXNMCEj2zAbNA/exec'; // ganti dengan URL deploy Apps Script

var STATE = { user: null, master: null, jsonpCounter: 0 };

function jsonp(action, params) {
  return new Promise(function(resolve, reject) {
    var cbName = 'cb_' + (STATE.jsonpCounter++) + '_' + Date.now();
    var script = document.createElement('script');
    window[cbName] = function(data) {
      resolve(data);
      delete window[cbName];
      script.remove();
    };
    var url = GAS_URL + '?action=' + action + '&callback=' + cbName;
    for (var k in params) {
      url += '&' + k + '=' + encodeURIComponent(params[k]);
    }
    script.src = url;
    script.onerror = function() { reject(new Error('Gagal terhubung ke server')); };
    document.body.appendChild(script);
  });
}

function showToast(msg, isError) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(function(){ t.className = 'toast'; }, 3000);
}

/* ================= LOGIN ================= */
function doLogin() {
  var pin = document.getElementById('pinInput').value.trim();
  var errEl = document.getElementById('loginErr');
  if (!pin) { errEl.textContent = 'Masukkan PIN.'; return; }
  errEl.textContent = 'Memeriksa...';
  jsonp('login', { pin: pin }).then(function(res) {
    if (res.ok) {
      STATE.user = res;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('app').className = 'show';
      document.getElementById('roleBadge').textContent = res.role;
      buildNav();
    } else {
      errEl.textContent = res.error || 'PIN salah.';
    }
  }).catch(function(err){ errEl.textContent = err.message; });
}
document.getElementById('pinInput').addEventListener('keydown', function(e){ if (e.key === 'Enter') doLogin(); });

function logout() {
  STATE.user = null;
  document.getElementById('app').className = '';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('pinInput').value = '';
}

/* ================= NAV PER ROLE (5 role final) ================= */
var NAV_BY_ROLE = {
  'Tim Gudang': [
    { id: 'logmasuk', label: '⬇️ Input Barang Masuk' },
    { id: 'stok', label: '📦 Stok Gudang' },
    { id: 'master', label: '🗂️ Master Data' }
  ],
  'Tim Lapangan': [
    { id: 'logkeluar', label: '⬆️ Input Pemakaian' },
    { id: 'stok', label: '📦 Cek Stok' }
  ],
  'Mandor': [
    { id: 'aktivitas', label: '👷 Aktivitas & Man Power' },
    { id: 'logkeluar', label: '⬆️ Input Pemakaian' },
    { id: 'stok', label: '📦 Cek Stok' }
  ],
  'Managerial': [
    { id: 'dashboard', label: '📊 Dashboard' },
    { id: 'rekapcost', label: '💰 Rekap Cost' },
    { id: 'stok', label: '📦 Stok Gudang' }
  ],
  'Owner': [
    { id: 'dashboard', label: '📊 Dashboard' },
    { id: 'rekapcost', label: '💰 Rekap Cost' },
    { id: 'stok', label: '📦 Stok Gudang' },
    { id: 'aktivitas', label: '👷 Aktivitas & Man Power' },
    { id: 'master', label: '🗂️ Master Data' }
  ]
};

function buildNav() {
  var nav = NAV_BY_ROLE[STATE.user.role] || [];
  var el = document.getElementById('navItems');
  el.innerHTML = '';
  nav.forEach(function(item, idx) {
    var div = document.createElement('div');
    div.className = 'nav-item' + (idx === 0 ? ' active' : '');
    div.textContent = item.label;
    div.onclick = function() {
      document.querySelectorAll('.nav-item').forEach(function(n){ n.classList.remove('active'); });
      div.classList.add('active');
      renderPage(item.id);
    };
    div.dataset.page = item.id;
    el.appendChild(div);
  });
  renderPage(nav[0] ? nav[0].id : '');
}

function renderPage(page) {
  var main = document.getElementById('mainContent');
  main.innerHTML = '<div class="loading">Memuat...</div>';
  if (page === 'dashboard') renderDashboard(main);
  else if (page === 'rekapcost') renderRekapCost(main);
  else if (page === 'stok') renderStok(main);
  else if (page === 'master') renderMaster(main);
  else if (page === 'logmasuk') renderLogMasuk(main);
  else if (page === 'logkeluar') renderLogKeluar(main);
  else if (page === 'aktivitas') renderAktivitas(main);
}

/* ================= DASHBOARD ================= */
function renderDashboard(main) {
  jsonp('getDashboard', {}).then(function(res) {
    if (!res.ok) { main.innerHTML = '<div class="err-msg">' + res.error + '</div>'; return; }
    var c = res.cards;
    var html = '<h1>Dashboard Monitoring</h1><div class="sub">Stok, man power & cost produksi — real-time</div>';
    html += '<div class="cards">';
    html += cardHtml('Total Item Pupuk', c.totalPupuk);
    html += cardHtml('Total Item Consumable', c.totalConsumable);
    html += cardHtml('Perlu Reorder/Habis', c.perluReorder, c.perluReorder > 0);
    html += cardHtml('Man Power Locked', c.mpLocked);
    html += '</div><div class="cards">';
    html += cardHtml('Nilai Stok Pupuk (Rp)', formatRp(c.nilaiStokPupuk));
    html += cardHtml('Nilai Stok Consumable (Rp)', formatRp(c.nilaiStokConsumable));
    html += cardHtml('Cost Produksi Terpakai (Rp)', formatRp(c.costProduksi));
    html += '</div>';
    html += '<div class="panel"><h3>Rekap per Greenhouse</h3><table><thead><tr><th>Greenhouse</th><th>Komoditi Aktif</th><th>Aktivitas Terakhir</th><th>MP Locked</th><th>MP Belum Lock</th><th>Cost Pupuk</th><th>Cost Consumable</th><th>Total Cost</th></tr></thead><tbody>';
    res.table.forEach(function(r) {
      html += '<tr><td>' + r.greenhouse + '</td><td>' + r.komoditiAktif + '</td><td>' + r.aktivitasTerakhir + '</td><td>' + r.mpLocked + '</td><td>' + r.mpBelumLock + '</td><td>' + formatRp(r.costPupuk) + '</td><td>' + formatRp(r.costConsumable) + '</td><td>' + formatRp(r.costProduksi) + '</td></tr>';
    });
    html += '</tbody></table></div>';
    main.innerHTML = html;
  });
}
function cardHtml(label, value, warn) {
  return '<div class="card' + (warn ? ' warn' : '') + '"><div class="label">' + label + '</div><div class="value">' + value + '</div></div>';
}
function formatRp(n) {
  n = Number(n) || 0;
  return 'Rp ' + n.toLocaleString('id-ID');
}

/* ================= REKAP COST ================= */
function renderRekapCost(main) {
  jsonp('getRekapCost', {}).then(function(res) {
    if (!res.ok) { main.innerHTML = '<div class="err-msg">' + res.error + '</div>'; return; }
    var html = '<h1>Rekap Cost</h1><div class="sub">Pemakaian pupuk & consumable per greenhouse dan komoditi</div>';
    html += '<div class="panel"><h3>Cost per Greenhouse x Komoditi</h3><table><thead><tr><th>Greenhouse</th>';
    res.komoditiList.forEach(function(k){ html += '<th>' + k + '</th>'; });
    html += '<th>Total</th></tr></thead><tbody>';
    res.tableA.forEach(function(r) {
      html += '<tr><td>' + r.label + '</td>';
      res.komoditiList.forEach(function(k){ html += '<td>' + formatRp(r.values[k] || 0) + '</td>'; });
      html += '<td><b>' + formatRp(r.total) + '</b></td></tr>';
    });
    html += '</tbody></table></div>';
    html += '<div class="panel"><h3>Cost per Komoditi — Pupuk vs Consumable</h3><table><thead><tr><th>Komoditi</th><th>Cost Pupuk</th><th>Cost Consumable</th><th>Total</th><th>% Pupuk</th><th>% Consumable</th></tr></thead><tbody>';
    res.tableB.forEach(function(r) {
      html += '<tr><td>' + r.komoditi + '</td><td>' + formatRp(r.costPupuk) + '</td><td>' + formatRp(r.costConsumable) + '</td><td><b>' + formatRp(r.total) + '</b></td><td>' + (r.pctPupuk*100).toFixed(1) + '%</td><td>' + (r.pctConsumable*100).toFixed(1) + '%</td></tr>';
    });
    html += '</tbody></table></div>';
    if (!res.komoditiList.length) {
      html += '<div class="sub">Belum ada transaksi pemakaian tercatat, jadi laporan masih kosong.</div>';
    }
    main.innerHTML = html;
  });
}

function resetPinDefault() {
  if (!confirm('Yakin reset semua PIN 8 akun awal ke default pabrikan? Tindakan ini akan mengganti PIN yang sedang dipakai sekarang.')) return;
  jsonp('resetPinDefault', {}).then(function(res) {
    if (res.ok) { showToast('PIN berhasil direset ke default (1110, 1111, 2220, 2221, 3330, 3331, 4440, 5550)'); }
    else showToast(res.error, true);
  });
}

    else showToast(res.error, true);

    partNumber: val('mPartNumber'), description: val('mDescription'), itemType: val('mItemType'),

/* ================= LOG MASUK (Tim Gudang) ================= */
function renderLogMasuk(main) {
  jsonp('getMasterData', {}).then(function(res) {
    STATE.master = res;
    var html = '<h1>Input Barang Masuk</h1><div class="sub">Catat penerimaan pupuk / consumable ke gudang</div>';
    html += '<div class="panel"><div class="form-grid">';
    html += fieldHtml('Tanggal', 'inTanggal', 'date');
    html += selectHtml('Part Number', 'inPartNumber', res.parts.map(function(p){ return p.partNumber + ' - ' + p.description; }));
    html += fieldHtml('Jumlah Masuk', 'inJumlah', 'number');
    html += fieldHtml('Harga Satuan Masuk (Rp)', 'inHarga', 'number');
    html += fieldHtml('PIC', 'inPic');
    html += fieldHtml('Keterangan', 'inNote');
    html += '</div><div class="form-actions"><button class="btn btn-sm" onclick="submitLogMasuk()">Simpan</button></div></div>';
    html += '<div class="panel"><h3>Riwayat Barang Masuk Terbaru</h3><div id="logMasukTable" class="loading">Memuat...</div></div>';
    main.innerHTML = html;
    document.getElementById('inTanggal').valueAsDate = new Date();
    loadLogMasukTable();
  });
}
function loadLogMasukTable() {
  jsonp('getLogMasuk', {}).then(function(res) {
    var el = document.getElementById('logMasukTable');
    if (!res.ok) { el.innerHTML = res.error; return; }
    var html = '<table><thead><tr><th>ID</th><th>Tanggal</th><th>Part</th><th>Jumlah</th><th>Harga Satuan</th><th>Nilai</th><th>PIC</th></tr></thead><tbody>';
    res.logs.slice(0, 15).forEach(function(l) {
      html += '<tr><td>' + l.idLog + '</td><td>' + fmtDate(l.tanggal) + '</td><td>' + l.partNumber + ' - ' + l.description + '</td><td>' + l.jumlahMasuk + ' ' + l.uom + '</td><td>' + formatRp(l.hargaSatuan) + '</td><td>' + formatRp(l.nilaiMasuk) + '</td><td>' + l.pic + '</td></tr>';
    });
    html += '</tbody></table>';
    el.innerHTML = html;
  });
}
function submitLogMasuk() {
  var sel = document.getElementById('inPartNumber').value;
  var partNumber = sel.split(' - ')[0];
  var partObj = STATE.master.parts.find(function(p){ return p.partNumber === partNumber; });
  var p = {
    tanggal: val('inTanggal'), partNumber: partNumber, description: partObj ? partObj.description : '',
    itemType: partObj ? partObj.itemType : '', uom: partObj ? partObj.satuanUtama : '',
    jumlahMasuk: val('inJumlah'), hargaSatuan: val('inHarga'), pic: val('inPic'), note: val('inNote')
  };
  if (!p.partNumber || !p.jumlahMasuk || !p.hargaSatuan) { showToast('Lengkapi Part Number, Jumlah, dan Harga', true); return; }
  jsonp('addLogMasuk', p).then(function(res) {
    if (res.ok) { showToast('Barang masuk tersimpan (' + res.idLog + ')'); renderLogMasuk(document.getElementById('mainContent')); }
    else showToast(res.error, true);
  });
}

function renderAktivitas(main) {
  jsonp('getMasterData', {}).then(function(res) {
    STATE.master = res;
    var html = '<h1>Aktivitas & Man Power</h1><div class="sub">Kunci jumlah tenaga kerja per greenhouse & aktivitas</div>';
    html += '<div class="panel"><h3>Tambah Aktivitas</h3><div class="form-grid">';
    html += fieldHtml('Tanggal', 'aTanggal', 'date');
    html += selectHtml('Greenhouse', 'aGreenhouse', uniq(res.greenhouse.map(function(g){ return g.greenhouse; })));
    html += fieldHtml('Aktivitas', 'aAktivitas');
    html += fieldHtml('Komoditi', 'aKomoditi');
    html += fieldHtml('Jumlah Man Power', 'aJumlahMP', 'number');
    html += fieldHtml('PIC / Mandor', 'aPic');
    html += fieldHtml('Jam Kerja (jam)', 'aJam', 'number');
    html += fieldHtml('Hari Kerja (hari)', 'aHari', 'number');
    html += fieldHtml('Keterangan', 'aNote');
    html += '</div><div class="form-actions"><button class="btn btn-sm" onclick="submitAktivitas()">Simpan</button></div></div>';
    html += '<div class="panel"><h3>Daftar Aktivitas</h3><div id="aktivitasTable" class="loading">Memuat...</div></div>';
    main.innerHTML = html;
    document.getElementById('aTanggal').valueAsDate = new Date();
    loadAktivitasTable();
  });

function loadAktivitasTable() {
  jsonp('getAktivitas', {}).then(function(res) {
    var el = document.getElementById('aktivitasTable');
    if (!res.ok) { el.innerHTML = res.error; return; }
    var html = '<table><thead><tr><th>Greenhouse</th><th>Aktivitas</th><th>Komoditi</th><th>MP</th><th>Manhours</th><th>Cost MP</th><th>PIC</th><th>Status</th><th></th></tr></thead><tbody>';
    res.items.forEach(function(r) {
      var lockClass = r.statusLock === 'Locked' ? 'Locked' : 'BelumLock';
      var nextStatus = r.statusLock === 'Locked' ? 'Belum Lock' : 'Locked';
      var btnClass = r.statusLock === 'Locked' ? 'unlock' : 'lock';
      var btnLabel = r.statusLock === 'Locked' ? 'Buka Lock' : 'Kunci';
      html += '<tr><td>' + r.greenhouse + '</td><td>' + r.aktivitas + '</td><td>' + r.komoditi + '</td><td>' + r.jumlahMP + '</td><td>' + r.manhours + '</td><td>' + formatRp(r.costMP) + '</td><td>' + r.pic + '</td><td><span class="tag ' + lockClass + '" data-status="' + r.statusLock + '">' + r.statusLock + '</span></td><td><button class="btn-mini ' + btnClass + '" onclick="toggleLock(' + r.no + ',\'' + nextStatus + '\')">' + btnLabel + '</button></td></tr>';
    });
    html += '</tbody></table>';
    el.innerHTML = html;
  });
}
function submitAktivitas() {
  var p = {
    tanggal: val('aTanggal'), greenhouse: val('aGreenhouse'), aktivitas: val('aAktivitas'), komoditi: val('aKomoditi'),
    jumlahMP: val('aJumlahMP'), pic: val('aPic'), jamKerja: val('aJam'), hariKerja: val('aHari'), keterangan: val('aNote'),
    statusLock: 'Belum Lock'
  };
  if (!p.greenhouse || !p.aktivitas || !p.jumlahMP) { showToast('Lengkapi Greenhouse, Aktivitas, dan Jumlah Man Power', true); return; }
  jsonp('addAktivitas', p).then(function(res) {
    if (res.ok) { showToast('Aktivitas tersimpan'); renderAktivitas(document.getElementById('mainContent')); }
    else showToast(res.error, true);
  });
}
function toggleLock(no, nextStatus) {
  jsonp('toggleLockAktivitas', { no: no, statusLock: nextStatus }).then(function(res) {
    if (res.ok) { showToast('Status diperbarui'); loadAktivitasTable(); }
    else showToast(res.error, true);
  });
}

/* ================= HELPERS ================= */
function fieldHtml(label, id, type) {
  return '<div><label>' + label + '</label><input id="' + id + '" type="' + (type || 'text') + '"></div>';
}
function selectHtml(label, id, options) {
  var opts = '<option value="">- pilih -</option>';
  options.forEach(function(o){ opts += '<option value="' + o + '">' + o + '</option>'; });
  return '<div><label>' + label + '</label><select id="' + id + '">' + opts + '</select></div>';
}
function val(id) { return document.getElementById(id).value; }
function uniq(arr) { return arr.filter(function(v,i){ return arr.indexOf(v) === i; }); }
function fmtDate(d) {
  if (!d) return '';
  if (typeof d === 'string') return d.substring(0,10);
  var dt = new Date(d);
  return dt.toISOString().substring(0,10);
}
